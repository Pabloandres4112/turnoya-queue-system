# Docker Compose para desarrollo
name: turnoya-dev

services:
  # Backend en modo desarrollo
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=turnoya
      - DB_PASSWORD=turnoya_password
      - DB_NAME=turnoya_db
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - turnoya-network
    restart: on-failure
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - /app/node_modules
    command: npm run start:dev

  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=turnoya
      - POSTGRES_PASSWORD=turnoya_password
      - POSTGRES_DB=turnoya_db
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - turnoya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnoya -d turnoya_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5051:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@turnoya.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin-dev-data:/var/lib/pgadmin
    networks:
      - turnoya-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  turnoya-network:
    driver: bridge
    name: turnoya-network

volumes:
  postgres-dev-data:
    driver: local
  pgadmin-dev-data:
    driver: local
